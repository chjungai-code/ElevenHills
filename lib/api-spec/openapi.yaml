openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: revenue
    description: Revenue operations
  - name: sync
    description: Data sync operations
  - name: metrics
    description: Metric registry and typed query endpoint
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /revenue:
    get:
      operationId: getRevenue
      tags: [revenue]
      summary: List revenue records
      description: Returns revenue records with optional filtering by company, year, and month
      parameters:
        - name: company_id
          in: query
          required: false
          schema:
            type: string
        - name: year
          in: query
          required: false
          schema:
            type: integer
        - name: month
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Revenue records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueRecord"
  /sync/revenue:
    post:
      operationId: triggerRevenueSync
      tags: [sync]
      summary: Trigger revenue sync from Google Sheets
      description: Runs the Google Sheets revenue sync job immediately and returns the result
      responses:
        "200":
          description: Sync completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"
        "500":
          description: Sync failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"
  /metrics:
    get:
      operationId: listMetrics
      tags: [metrics]
      summary: List metric definitions
      description: Returns the server-side metric registry so the frontend can render labels, units, and formats without duplicating them.
      responses:
        "200":
          description: Metric registry
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MetricDefinition"
  /query:
    post:
      operationId: runQuery
      tags: [metrics]
      summary: Run a typed metric query
      description: Resolves the requested metrics against the server-side registry and returns rows + column metadata. Replaces ad-hoc client-side aggregation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRequest"
      responses:
        "200":
          description: Query result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
        "400":
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryError"
        "501":
          description: Dataset not yet available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SyncResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message
    RevenueRecord:
      type: object
      properties:
        id:
          type: string
        company_id:
          type: string
        year:
          type: integer
        month:
          type: integer
        amount:
          type: string
        category:
          type: string
          nullable: true
        memo:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
        - id
        - company_id
        - year
        - month
        - amount
        - created_at
    MetricDefinition:
      type: object
      properties:
        code:
          type: string
        label_ko:
          type: string
        unit:
          type: string
          enum: [KRW, PCT, YEARS, COUNT]
        format:
          type: string
        dataset:
          type: string
          enum: [revenue, kpi]
        description:
          type: string
          nullable: true
      required:
        - code
        - label_ko
        - unit
        - format
        - dataset
    QueryFilter:
      type: object
      description: One filter clause. Use 'value' for eq/gte/lte, 'values' for in, and min/max for between.
      properties:
        col:
          type: string
        op:
          type: string
          enum: [eq, in, between, gte, lte]
        value:
          oneOf:
            - type: string
            - type: number
          nullable: true
        values:
          type: array
          nullable: true
          items:
            type: string
        min:
          type: number
          nullable: true
        max:
          type: number
          nullable: true
      required:
        - col
        - op
    TimeRange:
      type: object
      properties:
        kind:
          type: string
          enum: [ltm, year, ytd]
        year:
          type: integer
          nullable: true
      required:
        - kind
    QueryRequest:
      type: object
      properties:
        dataset:
          type: string
          enum: [revenue, kpi]
        metrics:
          type: array
          items:
            type: string
        group_by:
          type: array
          nullable: true
          items:
            type: string
            enum: [company, store, month, quarter, year, kpi_code]
        filters:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/QueryFilter"
        time_range:
          allOf:
            - $ref: "#/components/schemas/TimeRange"
          nullable: true
        limit:
          type: integer
          nullable: true
      required:
        - dataset
        - metrics
    QueryColumn:
      type: object
      properties:
        key:
          type: string
        label_ko:
          type: string
        format:
          type: string
          nullable: true
        unit:
          type: string
          nullable: true
      required:
        - key
        - label_ko
    QueryMeta:
      type: object
      properties:
        generated_at:
          type: string
          format: date-time
        cache_hit:
          type: boolean
      required:
        - generated_at
        - cache_hit
    QueryResponse:
      type: object
      properties:
        columns:
          type: array
          items:
            $ref: "#/components/schemas/QueryColumn"
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
        meta:
          $ref: "#/components/schemas/QueryMeta"
      required:
        - columns
        - rows
        - meta
    QueryError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
