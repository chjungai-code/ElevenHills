openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: revenue
    description: Revenue operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /revenue:
    get:
      operationId: getRevenue
      tags: [revenue]
      summary: List revenue records
      description: Returns revenue records with optional filtering by company, year, and month
      parameters:
        - name: company_id
          in: query
          required: false
          schema:
            type: string
        - name: year
          in: query
          required: false
          schema:
            type: integer
        - name: month
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Revenue records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueRecord"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    RevenueRecord:
      type: object
      properties:
        id:
          type: string
        company_id:
          type: string
        year:
          type: integer
        month:
          type: integer
        amount:
          type: string
        category:
          type: string
          nullable: true
        memo:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
        - id
        - company_id
        - year
        - month
        - amount
        - created_at
